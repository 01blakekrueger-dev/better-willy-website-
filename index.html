<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WILLY V8.7 - ENGINE CORE</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; }
        .wrapper { margin-top: 50px; }
        #board { width: 400px; margin: 20px auto; border: 3px solid #222; }
        #console { background: #000; color: #0f0; padding: 10px; width: 380px; margin: 10px auto; border: 1px solid #333; height: 40px; line-height: 40px; font-weight: bold; }
        .stats { font-size: 1.2em; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #111; color: #0f0; border: 1px solid #0f0; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loader"><h1>BOOTING WILLY CORE...</h1></div>

<div class="wrapper">
    <h2>WILLY V8.7: AI ENGINE</h2>
    <div class="stats">GAMES: <span id="g_count">1</span> | WINS: <span id="w_count">0</span></div>
    <div id="console">INITIALIZING...</div>
    <div id="board"></div>
    <button onclick="resetGame()">RESET SYSTEM</button>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

<script>
    let pyodide;
    let board;
    let wins = 0;
    let games = 1;

    async function initWilly() {
        pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        await micropip.install("python-chess");

        // The exact Willy Python Logic
        await pyodide.runPythonAsync(`
import chess
import random
import math

class WillyEngine:
    def __init__(self):
        self.values = {chess.PAWN: 100, chess.KNIGHT: 310, chess.BISHOP: 335, chess.ROOK: 500, chess.QUEEN: 950, chess.KING: 20000}
    
    def eval(self, b):
        if b.is_checkmate(): return 999999 if b.turn == chess.WHITE else -999999
        s = 0
        for sq, p in b.piece_map().items():
            v = self.values.get(p.piece_type, 0)
            s += v if p.color == chess.BLACK else -v
        return s

    def minimax(self, b, depth, alpha, beta, maximizing):
        if depth == 0 or b.is_game_over(): return self.eval(b)
        if maximizing:
            v = -math.inf
            for m in b.legal_moves:
                b.push(m); v = max(v, self.minimax(b, depth-1, alpha, beta, False)); b.pop()
                alpha = max(alpha, v)
                if beta <= alpha: break
            return v
        else:
            v = math.inf
            for m in b.legal_moves:
                b.push(m); v = min(v, self.minimax(b, depth-1, alpha, beta, True)); b.pop()
                beta = min(beta, v)
                if beta <= alpha: break
            return v

    def select_move(self, fen):
        b = chess.Board(fen)
        best_m = None
        max_v = -math.inf
        for m in b.legal_moves:
            b.push(m); v = self.minimax(b, 3, -math.inf, math.inf, False); b.pop()
            if v > max_v: max_v = v; best_m = m
        return best_m.uci() if best_m else list(b.legal_moves)[0].uci()

willy = WillyEngine()
        `);

        $('#loader').fadeOut();
        $('#console').text("WILLY ONLINE: YOUR MOVE");
        setupBoard();
    }

    function setupBoard() {
        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            onDrop: handleMove
        });
    }

    async function handleMove(source, target) {
        let move = source + target;
        
        // Execute move in Python
        let result = await pyodide.runPythonAsync(`
import chess
board = chess.Board("${board.fen()}")
try:
    m = chess.Move.from_uci("${move}")
    if m in board.legal_moves:
        board.push(m)
        if not board.is_game_over():
            # Willy thinks and moves
            wm = willy.select_move(board.fen())
            board.push(chess.Move.from_uci(wm))
        
        res = "0-1" if board.is_checkmate() and board.turn == chess.WHITE else "LIVE"
        [board.fen(), res, board.is_game_over()]
    else:
        None
except:
    None
        `);

        if (!result) return 'snapback';

        board.position(result[0]);
        
        if (result[2]) { // Game Over
            games++;
            if (result[1] === "0-1") {
                wins++;
                $('#console').text("WILLY WINS!");
            } else {
                $('#console').text("GAME OVER");
            }
            $('#g_count').text(games);
            $('#w_count').text(wins);
        } else {
            $('#console').text("WILLY HAS MOVED");
        }
    }

    function resetGame() {
        board.start();
        $('#console').text("SYSTEM RESET - YOUR MOVE");
    }

    initWilly();
</script>
</body>
</html>
