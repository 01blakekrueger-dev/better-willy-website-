<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy Chess AI - V8.6</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #111;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        #status-bar {
            background: #222;
            color: #ff0;
            padding: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            border: 1px solid #444;
            min-width: 300px;
        }
        .stats {
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        #board {
            width: 400px;
            margin: 0 auto;
            border: 5px solid #444;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: #0f0;
            color: #000;
        }
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2>WAKING UP WILLY...</h2>
        <p>Downloading Python-Chess Logic (Pyodide)</p>
    </div>

    <div class="container">
        <h2>WILLY V8.6: WEB CORE</h2>
        
        <div id="status-bar">INITIALIZING SYSTEMS...</div>
        
        <div class="stats">
            GAMES: <span id="g_count">1</span> | WINS: <span id="w_count">0</span>
        </div>

        <div id="board"></div>

        <div class="controls">
            <button onclick="resetWilly()">RESET 1V1</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <script>
        let pyodide;
        let board;
        let games = 1;
        let wins = 0;

        async function startPython() {
            pyodide = await loadPyodide();
            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            await micropip.install("python-chess");

            // --- THE EXACT V8.6 PYTHON CORE ---
            await pyodide.runPythonAsync(`
import chess
import random
import math

class WillyV8:
    def __init__(self):
        self.piece_values = {
            chess.PAWN: 100, chess.KNIGHT: 310, chess.BISHOP: 335,
            chess.ROOK: 500, chess.QUEEN: 950, chess.KING: 20000
        }
        self.book = {
            "": ["e2e4", "d2d4", "c2c4", "g1f3"],
            "e2e4": ["c7c5", "e7e5", "e7e6", "c7c6"],
            "e2e4 e7e5": ["g1f3", "f1c4"],
            "d2d4": ["d7d5", "g8f6"]
        }

    def evaluate_board(self, board):
        if board.is_checkmate(): 
            return 999999 if board.turn == chess.WHITE else -999999
        score = 0
        for sq, piece in board.piece_map().items():
            val = self.piece_values.get(piece.piece_type, 0)
            score += val if piece.color == chess.BLACK else -val
        return score

    def minimax(self, board, depth, alpha, beta, maximizing):
        if depth == 0 or board.is_game_over(): 
            return self.evaluate_board(board)
        
        if maximizing:
            v = -math.inf
            for m in board.legal_moves:
                board.push(m)
                v = max(v, self.minimax(board, depth-1, alpha, beta, False))
                board.pop()
                alpha = max(alpha, v)
                if beta <= alpha: break
            return v
        else:
            v = math.inf
            for m in board.legal_moves:
                board.push(m)
                v = min(v, self.minimax(board, depth-1, alpha, beta, True))
                board.pop()
                beta = min(beta, v)
                if beta <= alpha: break
            return v

    def get_move(self, fen, history_str):
        board = chess.Board(fen)
        
        # Check Opening Book
        if history_str in self.book:
            return random.choice(self.book[history_str]), "BOOK MOVE"
        
        # AI Minimax Logic
        best_move = None
        max_v = -math.inf
        for m in board.legal_moves:
            board.push(m)
            v = self.minimax(board, 3, -math.inf, math.inf, False)
            board.pop()
            if v > max_v:
                max_v = v
                best_move = m
        
        final_move = best_move if best_move else random.choice(list(board.legal_moves))
        return final_move.uci(), "THINKING MOVE"

willy = WillyV8()
            `);

            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('status-bar').innerText = "SYSTEM ONLINE - YOUR MOVE";
            initBoard();
        }

        function initBoard() {
            var config = {
                draggable: true,
                position: 'start',
                orientation: 'white',
                onDrop: onDrop,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            board = Chessboard('board', config);
        }

        async function onDrop(source, target) {
            let moveUCI = source + target;
            let currentFEN = board.fen();
            
            // Get history to check opening book
            let history = board.history ? board.history().join(" ") : "";

            let result = await pyodide.runPythonAsync(`
import chess
b = chess.Board("${currentFEN}")
move = chess.Move.from_uci("${moveUCI}")
status = "LIVE"
willy_won = False

if move in b.legal_moves:
    b.push(move)
    if b.is_game_over():
        status = "GAME OVER"
    else:
        # Willy's Turn
        move_history = "" # Web simplified history
        w_move, w_type = willy.get_move(b.fen(), move_history)
        b.push(chess.Move.from_uci(w_move))
        status = w_type
        
        if b.is_game_over():
            status = "CHECKMATE!"
            if b.result() == "0-1":
                willy_won = True
    
    [b.fen(), status, willy_won]
else:
    None
            `);

            if (result === null) return 'snapback';

            board.position(result[0]);
            document.getElementById('status-bar').innerText = result[1];
            
            if (result[1] === "CHECKMATE!" || result[1] === "GAME OVER") {
                games++;
                if (result[2]) wins++;
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById('g_count').innerText = games;
            document.getElementById('w_count').innerText = wins;
        }

        function resetWilly() {
            board.start();
            document.getElementById('status-bar').innerText = "READY FOR REMATCH";
        }

        startPython();
    </script>
</body>
</html>
